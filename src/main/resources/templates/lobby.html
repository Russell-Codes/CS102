<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Splendor — Waiting Room</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div class="login-container" style="max-width: 600px">
      <h1>Room: <span style="color: white" th:text="${roomId}"></span></h1>
      <h2 style="margin-bottom: 20px">
        Waiting for players... (<span th:text="${game.players.size()}"></span
        >/<span th:text="${game.capacity}"></span>)
      </h2>

      <div
        th:if="${param.error != null and param.error[0] == 'full'}"
        style="
          background: #8b0000;
          color: white;
          padding: 10px;
          border-radius: 4px;
          margin-bottom: 15px;
          font-weight: bold;
        "
      >
        Sorry, this room is already full!
      </div>

      <div
        style="
          text-align: left;
          background: #1a0a00;
          padding: 15px;
          border-radius: 6px;
          border: 1px solid #8b6914;
          margin-bottom: 20px;
        "
      >
        <h3 style="color: #c8a000; margin-bottom: 10px">Player Slots</h3>
        <ul style="list-style-type: none; padding: 0">
          <li
            th:each="p : ${game.players}"
            style="
              margin-bottom: 8px;
              padding: 10px;
              background: #2c1a0a;
              border-radius: 4px;
              border: 1px solid #555;
            "
          >
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                width: 100%;
              "
            >
              <span>
                <strong th:text="${p.name}"></strong>
                <span
                  th:if="${p.uuid == game.hostUuid}"
                  style="color: #c0a07a; font-size: 0.8rem"
                  >(Host)</span
                >
                <span th:if="${p.ai}" style="color: #c0a07a; font-size: 0.8rem"
                  >(CPU)</span
                >
              </span>
              <span>
                <span
                  th:if="${p.ready}"
                  style="color: #2a9d2a; margin-right: 10px; font-weight: bold"
                  >READY ✓</span
                >
                <span
                  th:if="${!p.ready}"
                  style="color: #c43030; margin-right: 10px"
                  >Waiting...</span
                >

                <form
                  th:if="${p.ai and myUuid == game.hostUuid}"
                  th:action="@{|/lobby/${roomId}/remove-ai|}"
                  method="post"
                  style="display: inline"
                >
                  <input type="hidden" name="targetUuid" th:value="${p.uuid}" />
                  <button
                    type="submit"
                    class="btn-small"
                    style="background: #8b0000; color: white"
                  >
                    Remove
                  </button>
                </form>
              </span>
            </div>
          </li>

          <th:block th:if="${game.capacity > game.players.size()}">
            <li
              th:each="i : ${#numbers.sequence(1, game.capacity - game.players.size())}"
              style="
                margin-bottom: 8px;
                padding: 10px;
                background: #2c1a0a;
                border-radius: 4px;
                border: 1px solid #555;
              "
            >
              <div
                style="
                  display: flex;
                  justify-content: space-between;
                  align-items: center;
                  width: 100%;
                "
              >
                <span style="color: #888; font-style: italic">Empty Slot</span>

                <form
                  th:if="${myUuid == game.hostUuid}"
                  th:action="@{|/lobby/${roomId}/add-ai|}"
                  method="post"
                  style="display: inline"
                >
                  <button
                    type="submit"
                    class="btn-small"
                    style="background: #4a4a8f; color: white"
                  >
                    + Add AI
                  </button>
                </form>
              </div>
            </li>
          </th:block>
        </ul>
      </div>

      <div>
        <form
          th:if="${me == null}"
          th:action="@{|/lobby/${roomId}/ready|}"
          method="post"
          style="margin-bottom: 20px"
        >
          <div class="form-group">
            <label for="playerName">Enter Your Name</label>
            <input
              type="text"
              id="playerName"
              name="playerName"
              placeholder="Your Name"
              required
              maxlength="20"
            />
          </div>
          <button
            type="submit"
            class="btn-primary"
            style="background: #2a9d2a; width: 100%"
            th:disabled="${game.players.size() >= game.capacity}"
          >
            Join Lobby
          </button>
        </form>

        <p
          th:if="${me != null}"
          style="color: #c8a000; font-weight: bold; margin-bottom: 20px"
        >
          You are in the lobby!
        </p>
      </div>

      <div th:if="${myUuid == game.hostUuid}">
        <form th:action="@{|/lobby/${roomId}/start|}" method="post">
          <button
            type="submit"
            class="btn-primary"
            th:disabled="${!allReady}"
            style="
              width: 100%;
              background: #c8a000;
              color: #000;
              font-weight: bold;
            "
          >
            Start Game
          </button>
        </form>
        <p style="font-size: 0.8rem; color: #c0a07a; margin-top: 10px">
          Game can start when all slots are filled and everyone is ready.
        </p>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:inline="javascript">
      var roomId = /*[[${roomId}]]*/ "default-room";
      var stompClient = Stomp.over(new SockJS("/splendor-websocket"));
      stompClient.debug = null;
      stompClient.connect({}, function () {
        stompClient.subscribe("/topic/room/" + roomId, function () {
          window.location.reload();
        });
      });
    </script>
  </body>
</html>
