<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Splendor — Waiting Room</title>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
  </head>
  <body
    class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center justify-center p-4 font-sans"
  >
    <div
      class="w-full max-w-lg bg-gray-800 border border-gray-700 rounded-2xl shadow-2xl p-6 sm:p-8"
    >
      <div class="text-center mb-8">
        <h1 class="text-2xl text-gray-400">
          Room:
          <span
            class="text-white font-mono tracking-wider font-bold"
            th:text="${roomId}"
          ></span>
        </h1>
        <h2 class="text-lg text-yellow-500 mt-2 font-semibold">
          Waiting for players... (<span th:text="${game.players.size()}"></span
          >/<span th:text="${game.capacity}"></span>)
        </h2>
      </div>

      <div
        th:if="${param.error != null and param.error[0] == 'full'}"
        class="bg-red-600 text-white font-bold p-3 rounded-lg mb-6 text-center shadow"
      >
        Sorry, this room is already full!
      </div>

      <div class="bg-gray-900 border border-gray-700 rounded-xl p-4 mb-6">
        <h3
          class="text-sm uppercase tracking-widest text-gray-500 font-bold mb-4"
        >
          Player Slots
        </h3>
        <ul class="space-y-3">
          <li
            th:each="p : ${game.players}"
            class="flex justify-between items-center bg-gray-800 border border-gray-700 rounded-lg p-3 shadow-sm"
          >
            <div>
              <strong class="text-lg text-white" th:text="${p.name}"></strong>
              <span
                th:if="${p.uuid == game.hostUuid}"
                class="ml-2 px-2 py-0.5 bg-yellow-900/50 text-yellow-500 text-xs rounded-full border border-yellow-700"
                >Host</span
              >
              <span
                th:if="${p.ai}"
                class="ml-2 px-2 py-0.5 bg-purple-900/50 text-purple-400 text-xs rounded-full border border-purple-700"
                >CPU</span
              >
            </div>
            <div class="flex items-center gap-3">
              <span th:if="${p.ready}" class="text-green-500 font-bold text-sm"
                >READY ✓</span
              >
              <span
                th:if="${!p.ready}"
                class="text-red-400 text-sm animate-pulse"
                >Waiting...</span
              >

              <form
                th:if="${p.ai and myUuid == game.hostUuid}"
                th:action="@{|/lobby/${roomId}/remove-ai|}"
                method="post"
              >
                <input type="hidden" name="targetUuid" th:value="${p.uuid}" />
                <button
                  type="submit"
                  class="bg-red-900 hover:bg-red-700 text-red-100 text-xs px-2 py-1 rounded transition-colors hover:cursor-pointer"
                >
                  Remove
                </button>
              </form>
            </div>
          </li>

          <th:block th:if="${game.capacity > game.players.size()}">
            <li
              th:each="i : ${#numbers.sequence(1, game.capacity - game.players.size())}"
              class="flex justify-between items-center bg-gray-900 border border-dashed border-gray-600 rounded-lg p-3"
            >
              <span class="text-gray-500 italic">Empty Slot</span>
              <form
                th:if="${myUuid == game.hostUuid}"
                th:action="@{|/lobby/${roomId}/add-ai|}"
                method="post"
              >
                <button
                  type="submit"
                  class="bg-indigo-900 hover:bg-indigo-700 text-indigo-100 text-xs px-3 py-1 rounded transition-colors hover:cursor-pointer"
                >
                  + Add AI
                </button>
              </form>
            </li>
          </th:block>
        </ul>
      </div>

      <div th:if="${me == null}" class="mb-4">
        <form
          th:action="@{|/lobby/${roomId}/ready|}"
          method="post"
          class="space-y-3"
        >
          <div>
            <input
              type="text"
              name="playerName"
              placeholder="Enter Your Name"
              required
              maxlength="20"
              class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-500 transition-all text-center text-lg"
            />
          </div>
          <button
            type="submit"
            th:disabled="${game.players.size() >= game.capacity}"
            class="w-full bg-green-600 hover:bg-green-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold py-3 rounded-lg shadow-lg transition-colors hover:cursor-pointer"
          >
            Join Lobby
          </button>
        </form>
      </div>

      <div th:if="${me != null}" class="text-center mb-6">
        <p class="text-green-400 font-bold text-lg">You are in the lobby!</p>
      </div>

      <div
        th:if="${myUuid == game.hostUuid}"
        class="pt-4 border-t border-gray-700"
      >
        <form th:action="@{|/lobby/${roomId}/start|}" method="post">
          <button
            type="submit"
            th:disabled="${!allReady}"
            class="w-full bg-yellow-500 hover:bg-yellow-400 disabled:bg-gray-700 disabled:text-gray-500 disabled:cursor-not-allowed text-gray-900 font-extrabold py-4 rounded-xl shadow-lg transition-colors text-xl uppercase tracking-wider hover:cursor-pointer"
          >
            Start Game
          </button>
        </form>
        <p class="text-xs text-gray-500 text-center mt-3">
          Game can start when all slots are filled and everyone is ready.
        </p>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:inline="javascript">
      var roomId = /*[[${roomId}]]*/ "default-room";
      var stompClient = Stomp.over(new SockJS("/splendor-websocket"));
      stompClient.debug = null;
      stompClient.connect({}, function () {
        stompClient.subscribe("/topic/room/" + roomId, function () {
          window.location.reload();
        });
      });
    </script>
  </body>
</html>
