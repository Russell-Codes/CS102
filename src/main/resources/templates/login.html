<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Splendor — Online</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
      .lobby-wrapper {
        display: flex;
        flex-wrap: wrap;
        gap: 40px;
        justify-content: center;
        max-width: 850px;
      }
      .lobby-section {
        flex: 1;
        min-width: 300px;
      }
      .divider {
        width: 2px;
        background: #8b6914;
        border-radius: 2px;
      }
      @media (max-width: 700px) {
        .divider {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div
      class="message-banner"
      th:if="${param.error != null and param.error[0] == 'notfound'}"
    >
      Error: Room not found. Please check the Room ID and try again.
    </div>
    <div
      class="message-banner"
      th:if="${param.error != null and param.error[0] == 'full'}"
    >
      Error: That room is already at maximum capacity!
    </div>
    <div
      class="message-banner"
      th:if="${param.error != null and param.error[0] == 'started'}"
    >
      Error: That game has already started!
    </div>

    <div class="login-container lobby-wrapper">
      <div class="lobby-section">
        <h1>Splendor</h1>
        <h2>Create New Game</h2>
        <form th:action="@{/start}" method="post">
          <div class="form-group">
            <label for="hostName">Your Name (Host)</label>
            <input
              type="text"
              id="hostName"
              name="hostName"
              placeholder="Enter your name"
              required
              maxlength="20"
            />
          </div>
          <div class="form-group">
            <label for="numPlayers">Room Capacity</label>
            <select id="numPlayers" name="numPlayers">
              <option value="2">2 Players</option>
              <option value="3">3 Players</option>
              <option value="4">4 Players</option>
            </select>
          </div>
          <button type="submit" class="btn-primary">Create Lobby</button>
        </form>
      </div>

      <div class="divider"></div>

      <div class="lobby-section">
        <h1>&nbsp;</h1>
        <h2>Join Existing Game</h2>
        <form action="/join" method="get">
          <div class="form-group">
            <label for="roomId">Room ID</label>
            <input
              type="text"
              id="roomId"
              name="roomId"
              placeholder="e.g. A1B2C3"
              required
            />
          </div>
          <button type="submit" class="btn-primary" style="background: #4a4a8f">
            Join Lobby
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
