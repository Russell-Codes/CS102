<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Splendor — Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="login-container">
    <h1>Splendor</h1>
    <h2>Enter Player Names</h2>
    <form th:action="@{/start}" th:object="${login}" method="post">
        <div class="form-group">
            <label for="play1">Player 1</label>
            <input type="text" id="play1" th:field="*{play1}" placeholder="Player 1" maxlength="20" required>
        </div>
        <div class="form-group">
            <label for="play2">Player 2</label>
            <input type="text" id="play2" th:field="*{play2}" placeholder="Player 2" maxlength="20" required>
        </div>
        <button type="submit" class="btn-primary">Start Game</button>
    </form>
</div>
</body>
</html>
