<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Splendor — Page Not Found</title>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
  </head>
  <body
    class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center justify-center p-4 font-sans"
  >
    <div
      class="w-full max-w-lg bg-gray-800 border border-gray-700 rounded-2xl shadow-2xl p-8 text-center"
    >
      <h1 class="text-6xl font-extrabold text-red-500 mb-4">404</h1>
      <h2 class="text-2xl text-gray-300 font-bold mb-6">
        Oops! You lost your way.
      </h2>
      <p class="text-gray-400 mb-8">
        The page you are looking for doesn't exist or you don't have access to
        it.
      </p>

      <a
        th:href="@{/}"
        class="inline-block bg-linear-to-r from-yellow-600 to-yellow-500 hover:from-yellow-500 hover:to-yellow-400 text-gray-900 font-bold py-3 px-8 rounded-lg shadow-lg transition-transform transform hover:-translate-y-0.5"
      >
        Return to Home
      </a>
    </div>
  </body>
</html>
