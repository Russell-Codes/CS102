<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Splendor</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Message Banner -->
<div class="message-banner" th:if="${game.message != null and !game.message.isEmpty()}"
     th:text="${game.message}"></div>

<div class="game-layout">

    <!-- ===== LEFT: Board ===== -->
    <div class="board-section">

        <!-- Turn indicator -->
        <div class="turn-indicator">
            <span>Current Turn: </span>
            <strong th:text="${game.currentPlayer.name}">Player</strong>
        </div>

        <!-- Noble Tiles -->
        <div class="nobles-row">
            <h3>Nobles</h3>
            <div class="nobles-container">
                <div class="noble-tile" th:each="noble : ${game.activeNobles}">
                    <div class="noble-vp" th:text="${noble.victoryPoints}">3</div>
                    <div class="noble-req">
                        <span th:each="i : ${#numbers.sequence(0, 4)}"
                              th:if="${noble.requirement[i] > 0}"
                              th:class="'gem-cost gem-' + ${game.gemColorName(i)}"
                              th:text="${noble.requirement[i]}"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Card Grid: Tiers 3 → 1 (highest tier at top) -->
        <div class="card-grid" th:each="tier : ${#numbers.sequence(3, 1, -1)}">
            <div class="tier-label" th:text="'Tier ' + ${tier} + ' (' + ${game.getDeckSize(tier)} + ' left)'">Tier</div>
            <div class="tier-row">
                <!-- Deck back -->
                <div class="card deck-back" th:text="'×' + ${game.getDeckSize(tier)}"></div>

                <!-- 4 visible cards for this tier -->
                <div th:each="card, stat : ${game.getVisibleCardsForTier(tier)}"
                     th:with="slotIndex=${(tier - 1) * 4 + stat.index}">

                    <!-- Empty slot -->
                    <div class="card card-empty" th:if="${card == null}">—</div>

                    <!-- Card -->
                    <div class="card" th:if="${card != null}"
                         th:class="'card gem-' + ${card.gemColor.name().toLowerCase()}">
                        <div class="card-header">
                            <span class="card-vp" th:text="${card.value}">0</span>
                            <span class="card-gem" th:text="${card.gemColor.name().toLowerCase()}"></span>
                        </div>
                        <div class="card-cost">
                            <span th:each="i : ${#numbers.sequence(0, 4)}"
                                  th:if="${card.cost[i] > 0}"
                                  th:class="'gem-cost gem-' + ${game.gemColorName(i)}"
                                  th:text="${card.cost[i]}"></span>
                        </div>
                        <div class="card-actions">
                            <form th:action="@{/game/buy-card}" method="post" style="display:inline">
                                <input type="hidden" name="cardIndex" th:value="${slotIndex}">
                                <button type="submit" class="btn-small btn-buy">Buy</button>
                            </form>
                            <form th:action="@{/game/reserve-card}" method="post" style="display:inline">
                                <input type="hidden" name="cardIndex" th:value="${slotIndex}">
                                <button type="submit" class="btn-small btn-reserve">Reserve</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Coin Bank -->
        <div class="coin-bank">
            <h3>Coin Bank</h3>
            <p class="coin-hint">Take up to 3 different gems, or 2 of the same (bank needs ≥4).</p>
            <form th:action="@{/game/take-coins}" method="post">
                <div class="coins-row">
                    <!-- White -->
                    <div th:class="'coin-spinner gem-' + ${game.gemColorName(0)}">
                        <span>White</span>
                        <span class="coin-count" th:text="'×' + ${game.bankCoins[0]}">×4</span>
                        <input type="number" name="white" min="0" max="2" value="0"
                               th:disabled="${game.bankCoins[0] == 0}" class="coin-num">
                    </div>
                    <!-- Blue -->
                    <div th:class="'coin-spinner gem-' + ${game.gemColorName(1)}">
                        <span>Blue</span>
                        <span class="coin-count" th:text="'×' + ${game.bankCoins[1]}">×4</span>
                        <input type="number" name="blue" min="0" max="2" value="0"
                               th:disabled="${game.bankCoins[1] == 0}" class="coin-num">
                    </div>
                    <!-- Green -->
                    <div th:class="'coin-spinner gem-' + ${game.gemColorName(2)}">
                        <span>Green</span>
                        <span class="coin-count" th:text="'×' + ${game.bankCoins[2]}">×4</span>
                        <input type="number" name="green" min="0" max="2" value="0"
                               th:disabled="${game.bankCoins[2] == 0}" class="coin-num">
                    </div>
                    <!-- Red -->
                    <div th:class="'coin-spinner gem-' + ${game.gemColorName(3)}">
                        <span>Red</span>
                        <span class="coin-count" th:text="'×' + ${game.bankCoins[3]}">×4</span>
                        <input type="number" name="red" min="0" max="2" value="0"
                               th:disabled="${game.bankCoins[3] == 0}" class="coin-num">
                    </div>
                    <!-- Black -->
                    <div th:class="'coin-spinner gem-' + ${game.gemColorName(4)}">
                        <span>Black</span>
                        <span class="coin-count" th:text="'×' + ${game.bankCoins[4]}">×4</span>
                        <input type="number" name="black" min="0" max="2" value="0"
                               th:disabled="${game.bankCoins[4] == 0}" class="coin-num">
                    </div>
                    <!-- Gold (display only) -->
                    <div class="coin-spinner gem-gold">
                        <span>Gold</span>
                        <span class="coin-count" th:text="'×' + ${game.bankCoins[5]}">×5</span>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Take Coins</button>
            </form>
        </div>
    </div>

    <!-- ===== RIGHT: Player Panels ===== -->
    <div class="players-section">
        <div th:each="p, pStat : ${game.players}"
             th:class="${pStat.index == game.nowTurn} ? 'player-panel active-player' : 'player-panel'">

            <h3 th:text="${p.name}">Player</h3>
            <div class="player-score">Score: <strong th:text="${p.score}">0</strong></div>

            <!-- Coins held -->
            <div class="player-coins">
                <h4>Coins</h4>
                <span th:each="i : ${#numbers.sequence(0, 5)}"
                      th:if="${p.mycoins[i] > 0}"
                      th:class="'gem-cost gem-' + ${game.gemColorName(i)}"
                      th:text="${game.gemColorName(i).substring(0,1).toUpperCase() + ': ' + p.mycoins[i]}"></span>
                <span th:if="${p.getTotalCoins() == 0}">None</span>
            </div>

            <!-- Card bonuses -->
            <div class="player-bonuses">
                <h4>Card Bonuses</h4>
                <span th:each="i : ${#numbers.sequence(0, 4)}"
                      th:if="${p.mycards[i] > 0}"
                      th:class="'gem-cost gem-' + ${game.gemColorName(i)}"
                      th:text="${game.gemColorName(i).substring(0,1).toUpperCase() + ': +' + p.mycards[i]}"></span>
                <span th:if="${p.mycards[0] + p.mycards[1] + p.mycards[2] + p.mycards[3] + p.mycards[4] == 0}">None</span>
            </div>

            <!-- Reserved cards -->
            <div class="player-reserved" th:if="${!p.reservedCards.isEmpty()}">
                <h4>Reserved Cards</h4>
                <div th:each="rc, rcStat : ${p.reservedCards}"
                     th:class="'card card-small gem-' + ${rc.gemColor.name().toLowerCase()}">
                    <span class="card-vp" th:text="${rc.value}">0</span>
                    <span class="card-gem" th:text="${rc.gemColor.name().toLowerCase()}"></span>
                    <!-- Buy from reserve: only active player's reserved cards show buy button -->
                    <form th:if="${pStat.index == game.nowTurn}"
                          th:action="@{/game/buy-card}" method="post" style="display:inline">
                        <!-- Encode as negative index: -(rcStat.index + 1) -->
                        <input type="hidden" name="cardIndex" th:value="${-(rcStat.index + 1)}">
                        <button type="submit" class="btn-small btn-buy">Buy</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div><!-- end game-layout -->

</body>
</html>
